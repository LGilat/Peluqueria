# Configuración para Render (https://render.com)
# Este archivo define cómo desplegar la aplicación en Render.

services:
  - type: web
    name: peluqueria-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://frontpeluqueria.netlify.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://frontpeluqueria.netlify.app"
    autoDeploy: true
    region: frankfurt
    plan: free
